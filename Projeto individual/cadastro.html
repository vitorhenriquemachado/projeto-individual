<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style/cadastro.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">


</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="./assets/corinthians.94597c2d.png">
        </div>

        <div class="caixa">
            <h1>Faça seu cadastro</h1>

            <div class="campos">
                <input type="text" placeholder="Insira seu nome" id="ipt_nome">
                <input type="text" placeholder="Insira seu e-mail" id="ipt_login">
                <input type="password" placeholder="Insira sua senha" id="ipt_senha">
                <input type="text" placeholder="Insira sua data de nascimento (Ano-Mês-Dia)" id="ipt_dtNasc">
                <div class="botao">
                <button onclick="cadastrar()"><a href="login.html" class="link">CADASTRAR</a></button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
